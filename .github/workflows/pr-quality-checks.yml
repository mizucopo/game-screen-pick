name: PR Quality Checks

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  quality-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version-file: '.python-version'

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked

      - name: Run pytest
        id: pytest
        continue-on-error: true
        timeout-minutes: 10
        shell: bash
        env:
          PYTHONFAULTHANDLER: "1"
        run: |
          set -o pipefail
          uv run pytest --tb=short -v -o faulthandler_timeout=120 2>&1 | tee pytest_output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          if [ "$EXIT_CODE" -eq 0 ]; then
            RESULT="вЬЕ жИРеКЯ"
          else
            RESULT="вЭМ е§±жХЧ (зµВдЇЖгВ≥гГЉгГЙ: $EXIT_CODE)"
          fi
          echo "result=$RESULT" >> "$GITHUB_OUTPUT"
          exit "$EXIT_CODE"

      - name: Run mypy
        id: mypy
        continue-on-error: true
        run: |
          if uv run mypy > mypy_output.txt 2>&1; then
            RESULT="вЬЕ жИРеКЯ"
          else
            RESULT="вЭМ е§±жХЧ"
          fi
          echo "result=$RESULT" >> $GITHUB_OUTPUT

      - name: Run ruff format check
        id: ruff-format
        continue-on-error: true
        run: |
          if uv run ruff format --check . > ruff_format_output.txt 2>&1; then
            RESULT="вЬЕ жИРеКЯ"
          else
            RESULT="вЭМ е§±жХЧ"
          fi
          echo "result=$RESULT" >> $GITHUB_OUTPUT

      - name: Run ruff check
        id: ruff-check
        continue-on-error: true
        run: |
          if uv run ruff check . > ruff_check_output.txt 2>&1; then
            RESULT="вЬЕ жИРеКЯ"
          else
            RESULT="вЭМ е§±жХЧ"
          fi
          echo "result=$RESULT" >> $GITHUB_OUTPUT

      - name: Comment on PR
        if: github.event.pull_request.head.repo.fork == false
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment ${{ github.event.number }} --body "
          ## рЯФН Quality Checks Result

          | Item | Result |
          |-------------|------|
          | pytest | ${{ steps.pytest.outputs.result }} |
          | mypy | ${{ steps.mypy.outputs.result }} |
          | ruff format | ${{ steps.ruff-format.outputs.result }} |
          | ruff check | ${{ steps.ruff-check.outputs.result }} |
          "
