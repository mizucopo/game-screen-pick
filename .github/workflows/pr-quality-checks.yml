name: PR Quality Checks

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  quality-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked

      - name: Run pytest
        id: pytest
        continue-on-error: true
        timeout-minutes: 10
        shell: bash
        env:
          OMP_NUM_THREADS: "1"
          MKL_NUM_THREADS: "1"
          OPENBLAS_NUM_THREADS: "1"
          NUMEXPR_NUM_THREADS: "1"
          TOKENIZERS_PARALLELISM: "false"
          PYTHONFAULTHANDLER: "1"
        run: |
          set -o pipefail

          # Linuxでforkとネイティブスレッドの組み合わせにより
          # 稀にハングするため、multiprocessingを使うテストを分離実行する
          uv run pytest --tb=short -v -o faulthandler_timeout=120 tests/analyzers/test_image_quality_analyzer_pool.py 2>&1 | tee pytest_output_pool.txt
          POOL_STATUS=${PIPESTATUS[0]}

          uv run pytest --tb=short -v -o faulthandler_timeout=120 --ignore=tests/analyzers/test_image_quality_analyzer_pool.py tests 2>&1 | tee pytest_output_main.txt
          MAIN_STATUS=${PIPESTATUS[0]}

          cat pytest_output_pool.txt pytest_output_main.txt > pytest_output.txt

          if [ "$POOL_STATUS" -eq 0 ] && [ "$MAIN_STATUS" -eq 0 ]; then
            RESULT="✅ 成功"
            EXIT_CODE=0
          else
            RESULT="❌ 失敗 (pool: $POOL_STATUS, main: $MAIN_STATUS)"
            EXIT_CODE=1
          fi
          echo "result=$RESULT" >> $GITHUB_OUTPUT
          exit $EXIT_CODE

      - name: Run mypy
        id: mypy
        continue-on-error: true
        run: |
          if uv run mypy > mypy_output.txt 2>&1; then
            RESULT="✅ 成功"
          else
            RESULT="❌ 失敗"
          fi
          echo "result=$RESULT" >> $GITHUB_OUTPUT

      - name: Run ruff format check
        id: ruff-format
        continue-on-error: true
        run: |
          if uv run ruff format --check . > ruff_format_output.txt 2>&1; then
            RESULT="✅ 成功"
          else
            RESULT="❌ 失敗"
          fi
          echo "result=$RESULT" >> $GITHUB_OUTPUT

      - name: Run ruff check
        id: ruff-check
        continue-on-error: true
        run: |
          if uv run ruff check . > ruff_check_output.txt 2>&1; then
            RESULT="✅ 成功"
          else
            RESULT="❌ 失敗"
          fi
          echo "result=$RESULT" >> $GITHUB_OUTPUT

      - name: Comment on PR
        if: github.event.pull_request.head.repo.fork == false
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment ${{ github.event.number }} --body "
          ## 🔍 Quality Checks Result

          | Item | Result |
          |-------------|------|
          | pytest | ${{ steps.pytest.outputs.result }} |
          | mypy | ${{ steps.mypy.outputs.result }} |
          | ruff format | ${{ steps.ruff-format.outputs.result }} |
          | ruff check | ${{ steps.ruff-check.outputs.result }} |
          "
